<div class="container">
  <div class="image-side">
    <img src="https://cdn.discordapp.com/attachments/1226707700545486913/1284578354623942726/image.png?ex=66e72452&is=66e5d2d2&hm=30825e519057ebda352ccedcc8e56c65c33b31dacc63c7ce3b8b533590b9e5db&" alt="Fondo tecnológico">
  </div>
  <div class="form-side">
    <h2>¡Bienvenido!</h2>
    <p>Por favor completa tus datos</p>
    <form>
      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>

      <label for="email">Apellido</label>
      <input type="text" id="Apellido" name="Apellido" placeholder="Ingresa tu Apellido" required>

      <label for="telefono">Teléfono</label>
      <input type="tel" id="telefono" name="telefono" placeholder="Ingresa tu teléfono" required>

      <label for="documento">Documento de identidad</label>
      <select id="documento" name="documento">
        <option value="dni">DNI</option>
        <option value="pasaporte">Pasaporte</option>
        <option value="otro">Otro</option>
      </select>

      <label for="email">Correo electrónico</label>
      <input type="email" id="email" name="email" placeholder="Ingresa tu correo" required>

      <label for="edad">Edad</label>
      <input type="number" id="edad" name="edad" placeholder="Ingresa tu edad" required>

      <label for="sexo">Sexo</label>
      <select id="sexo" name="sexo">
        <option value="masculino">Masculino</option>
        <option value="femenino">Femenino</option>
        <option value="otro">Prefiero no Decirlo</option>
      </select>

      <label for="pais">País</label>
      <select id="pais" name="pais">
        <option value="peru">Perú</option>
        <option value="chile">Chile</option>
        <option value="ecuador">Ecuador</option>
        <option value="colombia">Colombia</option>
        <option value="otro">Otro</option>
      </select>

      <div class="checkbox">
        <input type="checkbox" id="acuerdo" name="acuerdo" required>
        <label for="acuerdo">Acepto los acuerdos de la política de datos</label>
      </div>

      <button type="submit">Registrarme</button>
    </form>
    <a routerLink="/login">¿Ya tienes una cuenta? Inicia Sesión</a>
  </div>
</div>
